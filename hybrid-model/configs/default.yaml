# Hybrid YOLO + LSTM Configuration

# Model configuration
model:
  # YOLO settings
  yolo:
    model: "yolov8n.pt"
    confidence: 0.3
    device: "auto"  # auto, cpu, cuda:0
    input_size: 640
  
  # LSTM settings
  lstm:
    input_size: 256  # YOLO feature dimension
    hidden_size: 256
    num_layers: 2
    bidirectional: true
    dropout: 0.3
    sequence_length: 30  # frames (6 seconds at 5 FPS)
    num_classes: 6  # milking tasks

# Training configuration
training:
  # General
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  
  # Optimizer
  optimizer: "adam"
  scheduler: "cosine"
  
  # Data
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  
  # Augmentation
  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation: 15
    brightness: 0.2
    contrast: 0.2
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 10
    min_delta: 0.001

# Data configuration
data:
  # Paths
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  
  # Video settings
  video_format: "mp4"
  target_fps: 5
  frame_size: [640, 640]
  
  # Annotation format
  annotation_format: "csv"  # csv, json, coco

# Inference configuration
inference:
  # Real-time settings
  source: "rtsp://camera-ip/stream"  # or video file path
  show_display: true
  save_output: false
  
  # Detection thresholds
  yolo_threshold: 0.3
  lstm_threshold: 0.5
  
  # Performance
  max_latency_ms: 250
  target_fps: 4

# Paths
paths:
  models_dir: "models"
  logs_dir: "logs"
  checkpoints_dir: "models/checkpoints"
  
# Logging
logging:
  level: "INFO"
  tensorboard: true
  wandb: false
