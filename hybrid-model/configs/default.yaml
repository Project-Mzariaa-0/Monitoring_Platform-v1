# Hybrid YOLO + LSTM Configuration

# Model configuration
model:
  # YOLO settings
  yolo:
    model: "yolov8n.pt"
    confidence: 0.05
    device: "auto"  # auto, cpu, cuda:0
    input_size: 640
  
  # LSTM settings
  lstm:
    input_size: 640
    hidden_size: 256
    num_layers: 2
    bidirectional: true
    dropout: 0.3
    sequence_length: 30
    num_classes: 6

# Domain-specific configuration
domain:
  # Camera layout
  camera:
    resolution: [1248, 576]
    fps: 12.8
  
  # Known locations (normalized coordinates)
  stations:
    dip_station: [0.1, 0.7, 0.2, 0.3]  # bottom-left corner
  
  # Person tracking
  max_persons: 2
  
  # Task-specific cues
  task_cues:
    TASK-01:
      name: "Pre-cleaning"
      signals: ["person", "arm_raised", "pipe", "water_spray"]
      description: "Person lifts pipe and shoots water"
    TASK-02:
      name: "Stripping"
      signals: ["person", "hand_on_udder"]
    TASK-03:
      name: "Machine attachment"
      signals: ["person", "cups_moving_to_udder"]
    TASK-04:
      name: "Milking"
      signals: ["cups_attached", "no_person_moving"]
    TASK-05:
      name: "Detachment"
      signals: ["cups_detaching"]
    TASK-06:
      name: "Post-dip"
      signals: ["person", "cup_filled", "cup_at_udder"]
      description: "Person fills cup at station, then applies dip"

# Training configuration
training:
  # General
  epochs: 200
  batch_size: 16
  learning_rate: 0.0005
  weight_decay: 0.0001
  
  # Optimizer
  optimizer: "adam"
  scheduler: "cosine"
  
  # Data
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  
  # Augmentation
  augmentation:
    enabled: true
    horizontal_flip: 0.5
    vertical_flip: 0.0
    rotation: 15
    brightness: 0.2
    contrast: 0.2
  
  # Early stopping
  early_stopping:
    enabled: true
    patience: 25
    min_delta: 0.001

# Data configuration
data:
  # Paths
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  
  # Video settings
  video_format: "mp4"
  target_fps: 5
  frame_size: [640, 640]
  
  # Annotation format
  annotation_format: "csv"  # csv, json, coco

# Inference configuration
inference:
  # Real-time settings
  source: "rtsp://camera-ip/stream"  # or video file path
  show_display: true
  save_output: false
  
  # Detection thresholds
  yolo_threshold: 0.3
  lstm_threshold: 0.5
  
  # Performance
  max_latency_ms: 250
  target_fps: 4

# Paths
paths:
  models_dir: "models"
  logs_dir: "logs"
  checkpoints_dir: "models/checkpoints"
  
# Logging
logging:
  level: "INFO"
  tensorboard: true
  wandb: false
