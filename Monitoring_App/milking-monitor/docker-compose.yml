services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-milking_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev"
    env_file:
      - apps/web/.env.local
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  inference-service:
    image: python:3.12-slim
    working_dir: /workspace/apps/inference-service
    command: sh -c "pip install -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8001"
    env_file:
      - apps/inference-service/.env
    volumes:
      - ./:/workspace
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/')\""]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 90s

volumes:
  postgres_data:
