services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: milking_monitor
      POSTGRES_USER: Ayman
      POSTGRES_PASSWORD: LUZAmaxxp001
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    image: node:22-alpine
    working_dir: /workspace/apps/web
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./:/workspace
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  inference-service:
    image: python:3.12-slim
    working_dir: /workspace/apps/inference-service
    command: sh -c "pip install -r requirements.txt && uvicorn src.main:app --host 0.0.0.0 --port 8001"
    volumes:
      - ./:/workspace
    ports:
      - "8001:8001"
    depends_on:
      - postgres

volumes:
  postgres_data:
