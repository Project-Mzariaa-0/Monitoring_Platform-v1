name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web App — Build, Lint, Typecheck, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          AUTH_SECRET: test-secret-for-ci
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Unit tests
        run: npx vitest run

  inference-checks:
    name: Inference Service — Lint, Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/inference-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/inference-service/requirements.txt
            apps/inference-service/requirements-dev.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src/

      - name: Pytest
        run: pytest tests/ -v --tb=short

  integration-checks:
    name: Integration — Docker Compose Smoke Test
    runs-on: ubuntu-latest
    needs: [web-checks, inference-checks]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env.local for web
        run: |
          cat > apps/web/.env.local << 'EOF'
          DATABASE_URL=postgres://postgres:postgres@localhost:5432/milking_monitor
          AUTH_SECRET=ci-test-secret
          NEXTAUTH_SECRET=ci-test-secret
          NEXTAUTH_URL=http://localhost:3000
          INFERENCE_SERVICE_TOKEN=ci-test-token
          EOF

      - name: Create .env for inference service
        run: |
          cat > apps/inference-service/.env << 'EOF'
          RTSP_STREAM_URL=rtsp://localhost:8554/stream
          WEB_APP_INGEST_URL=http://localhost:3000/api/events/ingest
          WEB_APP_INGEST_TOKEN=ci-test-token
          MODEL_WEIGHTS_PATH=yolov8n.pt
          CORS_ORIGINS=http://localhost:3000
          EOF

      - name: Start services
        run: docker compose up -d
        timeout-minutes: 5

      - name: Wait for services
        run: |
          echo "Waiting for services to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8001/ > /dev/null 2>&1; then
              echo "Inference service is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Web app is ready"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Check inference service health
        run: |
          response=$(curl -s http://localhost:8001/)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Check web app responds
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "Web app status: $status"
          [ "$status" = "200" ] || [ "$status" = "302" ]

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
